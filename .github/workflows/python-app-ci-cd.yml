name: Python App CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "python_app/**"
      - "electron_app/**"
      - ".github/workflows/python-app-ci-cd.yml"
  pull_request:
    branches:
      - main
    paths:
      - "python_app/**"
      - "electron_app/**"
      - ".github/workflows/python-app-ci-cd.yml"
  workflow_dispatch:
    inputs:
      product_version:
        description: "Versi release (format x.y.z). Kosongkan untuk auto."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Artifacts (Python + Electron)
    runs-on: windows-latest
    outputs:
      product_version: ${{ steps.meta.outputs.product_version }}
      artifact_name: ${{ steps.bundle.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron_app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX CLI
        shell: pwsh
        run: |
          try {
            dotnet tool update --global wix --version 6.*
          } catch {
            dotnet tool install --global wix --version 6.*
          }
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          wix --version

      - name: Resolve product version
        id: meta
        shell: pwsh
        run: |
          $manualVersion = "${{ inputs.product_version }}"

          if ($manualVersion) {
            $version = $manualVersion
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $runNumber = [int]"${{ github.run_number }}"
            $version = "1.0.$($runNumber % 65535)"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version harus format x.y.z. Diterima: $version"
          }

          "product_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Using ProductVersion: $version"

      - name: Build EXE + MSI
        shell: pwsh
        working-directory: python_app
        run: |
          .\scripts\build_all.ps1 -ProductVersion "${{ steps.meta.outputs.product_version }}"

      - name: Package Python outputs
        shell: pwsh
        working-directory: python_app
        run: |
          $version = "${{ steps.meta.outputs.product_version }}"
          .\scripts\package_release.ps1 -ProductVersion $version

      - name: Install Electron dependencies
        shell: pwsh
        working-directory: electron_app
        run: |
          npm ci

      - name: Build Electron installer + portable
        shell: pwsh
        working-directory: electron_app
        run: |
          $version = "${{ steps.meta.outputs.product_version }}"
          npm run dist:win -- --config.extraMetadata.version=$version

      - name: Bundle release files
        id: bundle
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.product_version }}"
          $bundleDir = Join-Path $env:GITHUB_WORKSPACE "release_bundle"

          if (Test-Path $bundleDir) {
            Remove-Item -Path $bundleDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null

          $pythonExeSource = Join-Path $env:GITHUB_WORKSPACE "python_app\release\photo_sorter.exe"
          $pythonMsiSource = Join-Path $env:GITHUB_WORKSPACE "python_app\release\photo_sorter.msi"

          if (-not (Test-Path $pythonExeSource)) { throw "Python EXE tidak ditemukan: $pythonExeSource" }
          if (-not (Test-Path $pythonMsiSource)) { throw "Python MSI tidak ditemukan: $pythonMsiSource" }

          Copy-Item $pythonExeSource (Join-Path $bundleDir "photo_sorter_${version}_python.exe")
          Copy-Item $pythonMsiSource (Join-Path $bundleDir "photo_sorter_${version}_python.msi")

          $electronReleaseDir = Join-Path $env:GITHUB_WORKSPACE "electron_app\release"
          $electronExeFiles = Get-ChildItem -Path $electronReleaseDir -File -Filter *.exe

          if (-not $electronExeFiles) {
            throw "Output Electron .exe tidak ditemukan di: $electronReleaseDir"
          }

          $installer = $electronExeFiles | Where-Object { $_.Name -match "setup" } | Select-Object -First 1
          if (-not $installer) {
            throw "Installer Electron (Setup .exe) tidak ditemukan."
          }

          $portable = $electronExeFiles | Where-Object { $_.FullName -ne $installer.FullName } | Select-Object -First 1
          if (-not $portable) {
            throw "Portable Electron (.exe) tidak ditemukan."
          }

          Copy-Item $installer.FullName (Join-Path $bundleDir "photo_sorter_${version}_electron_installer.exe")
          Copy-Item $portable.FullName (Join-Path $bundleDir "photo_sorter_${version}_electron_portable.exe")

          $artifactName = "photo-sorter-$version-windows"
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bundle.outputs.artifact_name }}
          path: release_bundle/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-windows.outputs.artifact_name }}
          path: release

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.build-windows.outputs.product_version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release/* --clobber
          else
            gh release create "$TAG_NAME" release/* --title "Photo Sorter $VERSION" --generate-notes
          fi
