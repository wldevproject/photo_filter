name: Python App CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "python_app/**"
      - ".github/workflows/python-app-ci-cd.yml"
  pull_request:
    branches:
      - main
    paths:
      - "python_app/**"
      - ".github/workflows/python-app-ci-cd.yml"
  workflow_dispatch:
    inputs:
      product_version:
        description: "Versi release (format x.y.z). Kosongkan untuk auto."
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Python EXE + MSI (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX CLI
        shell: pwsh
        run: |
          try {
            dotnet tool update --global wix --version 6.*
          } catch {
            dotnet tool install --global wix --version 6.*
          }
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          wix --version

      - name: Resolve product version
        id: meta
        shell: pwsh
        run: |
          $manualVersion = "${{ inputs.product_version }}"

          if ($manualVersion) {
            $version = $manualVersion
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $runNumber = [int]"${{ github.run_number }}"
            $version = "1.0.$($runNumber % 65535)"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version harus format x.y.z. Diterima: $version"
          }

          "product_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Using ProductVersion: $version"

      - name: Build EXE + MSI
        shell: pwsh
        working-directory: python_app
        run: |
          .\scripts\build_all.ps1 -ProductVersion "${{ steps.meta.outputs.product_version }}"

      - name: Prepare release files
        id: release_files
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.product_version }}"
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release_bundle"

          if (Test-Path $releaseDir) {
            Remove-Item -Path $releaseDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          $exeSource = Join-Path $env:GITHUB_WORKSPACE "python_app\dist\photo_sorter.exe"
          $msiSource = Join-Path $env:GITHUB_WORKSPACE "python_app\dist\photo_sorter.msi"

          if (-not (Test-Path $exeSource)) { throw "Python EXE tidak ditemukan: $exeSource" }
          if (-not (Test-Path $msiSource)) { throw "Python MSI tidak ditemukan: $msiSource" }

          $exeTarget = Join-Path $releaseDir "photo_sorter_${version}.exe"
          $msiTarget = Join-Path $releaseDir "photo_sorter_${version}.msi"

          Copy-Item $exeSource $exeTarget -Force
          Copy-Item $msiSource $msiTarget -Force

          "exe_path=$exeTarget" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "msi_path=$msiTarget" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagName = "${{ github.ref_name }}"
          $version = "${{ steps.meta.outputs.product_version }}"
          $exePath = "${{ steps.release_files.outputs.exe_path }}"
          $msiPath = "${{ steps.release_files.outputs.msi_path }}"

          gh release view $tagName --json name > $null 2>&1
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tagName $exePath $msiPath --clobber
          } else {
            gh release create $tagName $exePath $msiPath --title "Photo Sorter $version" --generate-notes
          }
